services:
  - type: web
    name: charaka-vaidya-api
    env: python
    rootDir: charaka_vaidya
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/ingest.py && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
